# Netlify / Cloudflare Pages 通用静态部署配置
[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/video/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
